<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Vector Factory</title>

    <link rel="stylesheet" href="css/app.css" />
    <script src="lib/CSInterface-4.0.0.js"></script>
    <script src="js/app.js"></script>
  </head>

  <body>
    <div id="app">
      <section class="panel-section">
        <div class="section-title">Element</div>
        <div id="previewBox">
          <img id="preview" alt="Current element preview" />
          <div class="preview-empty">No preview</div>
        </div>
        <button id="setElement">Set Element</button>
      </section>

      <section class="panel-section">
        <div class="section-title">Generate</div>
        <div class="row">
          <button id="clear">Clear</button>
          <button id="toggle">Hide</button>
          <button id="remapBtn" class="export">Remap</button>
        </div>
        <div class="gen-row">
          <button id="generate" class="primary">Generate all</button>
          <button id="generateS" class="primary">Blacks only</button>
          <button id="generateSK" class="primary">Colors only</button>
        </div>
      </section>

      <section class="panel-section">
        <div class="section-title">Export</div>
        <input id="prefix" type="text" placeholder="Filename Prefix" />
        <div class="path-row">
          <input
            id="exportPath"
            type="text"
            placeholder="Export folder"
            readonly
          />
          <button id="choosePathBtn" class="export">Choose Folder</button>
        </div>
        <button id="exportBtn" class="export">Export</button>
        <button id="exportSelectedBtn" class="export">Export Selected</button>
      </section>

      <div id="status">Ready</div>
    </div>

    <!-- Export Selected: choose which artboards to export -->
    <div id="abOverlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-title">Export Selected Artboards</div>
        <div id="abList" class="ab-list"></div>
        <div class="modal-row">
          <button id="abSelectAll" class="secondary small">Select All</button>
          <button id="abDeselectAll" class="secondary small">
            Deselect All
          </button>
        </div>
        <div class="modal-actions">
          <button id="abCancel" class="secondary">Cancel</button>
          <button id="abExport" class="primary">Export</button>
        </div>
      </div>
    </div>

    <!-- Remap Placeholders: rename S/SK* targets inside the selection -->
    <div id="remapOverlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-title">Remap Placeholders</div>
        <div id="remapList" class="remap-list"></div>
        <div class="modal-actions">
          <button id="remapCancel" class="secondary">Cancel</button>
          <button id="remapRename" class="primary">Rename</button>
        </div>
      </div>
    </div>
  </body>
</html>
