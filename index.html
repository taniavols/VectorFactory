<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Vector Factory</title>

    <link rel="stylesheet" href="css/app.css" />
    <script src="lib/CSInterface-4.0.0.js"></script>
    <script src="js/app.js"></script>
  </head>

  <body>
    <div id="app">
      <div id="previewBox">
        <img id="preview" alt="Current element preview" />
      </div>

      <button id="setElement">Set Element</button>
      <button id="generate" class="primary">Generate</button>

      <div class="row">
        <button id="clear">Clear</button>
        <button id="toggle">Hide</button>
      </div>

      <hr />

      <input id="prefix" type="text" placeholder="Filename Prefix" />
      <button id="exportBtn" class="export">Export</button>
      <button id="exportSelectedBtn" class="export secondary">
        Export Selected
      </button>

      <div id="status">Ready</div>
    </div>

    <!-- Export Selected: choose which artboards to export -->
    <div id="abOverlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-title">Export Selected Artboards</div>
        <div id="abList" class="ab-list"></div>
        <div class="modal-row">
          <button id="abSelectAll" class="secondary small">Select All</button>
          <button id="abDeselectAll" class="secondary small">
            Deselect All
          </button>
        </div>
        <div class="modal-actions">
          <button id="abCancel" class="secondary">Cancel</button>
          <button id="abExport" class="primary">Export</button>
        </div>
      </div>
    </div>
  </body>
</html>
